<!-- TAG SUPPORT PATCH — paste just before </body> in index.html -->
<style>
.tag-pill{font-family:'IBM Plex Mono',monospace;font-size:7px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;padding:0 4px;border-radius:2px;border:1px solid;white-space:nowrap;line-height:15px;display:inline-block;flex-shrink:0}
.tp-dsp{color:#1A4F8A;background:#E6EEFA;border-color:rgba(26,79,138,.3)}
.tp-ssp{color:#146B3A;background:#E4F5EC;border-color:rgba(20,107,58,.3)}
.tp-dmp{color:#7A4200;background:#FEF2E0;border-color:rgba(122,66,0,.3)}
.tp-id{color:#185FA5;background:#E6F1FB;border-color:rgba(24,95,165,.3)}
.tp-ctv{color:#5B2080;background:#F3E8FD;border-color:rgba(91,32,128,.3)}
.tp-agency{color:#4B2D9E;background:#EDE8FD;border-color:rgba(75,45,158,.3)}
.tp-pub{color:#555550;background:#EFEDE6;border-color:rgba(85,85,78,.3)}
.tp-data{color:#0F6E56;background:#E1F5EE;border-color:rgba(15,110,86,.3)}
.tp-prebid{color:#C2410C;background:#FFF7ED;border-color:rgba(194,65,12,.3)}
.tp-prio{color:#B45309;background:#FFFBEB;border-color:rgba(180,83,9,.3)}
.fp-sep{font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);align-self:center;white-space:nowrap;padding-right:6px;border-right:1px solid var(--rule);margin-right:2px;line-height:22px}
.row-tags{display:flex;gap:2px;flex-shrink:0;overflow:hidden;align-items:center}
</style>
<script>
try {
(function(){
var SB='https://nyzkkqqjnkctcmxoirdj.supabase.co';
var STAR='\u2605';

var TAG_DEFS=[
  {id:'dsp',    lbl:'DSP',         cls:'tp-dsp',    test:function(c){return /DSP/i.test(c.category||'')}},
  {id:'ssp',    lbl:'SSP',         cls:'tp-ssp',    test:function(c){return /SSP/i.test(c.category||'')}},
  {id:'dmp',    lbl:'DMP',         cls:'tp-dmp',    test:function(c){return /DMP/i.test(c.category||'')}},
  {id:'id',     lbl:'Identity',    cls:'tp-id',     test:function(c){return /identity/i.test(c.category||'')&&!/DSP|SSP/i.test(c.category||'')}},
  {id:'ctv',    lbl:'CTV',         cls:'tp-ctv',    test:function(c){return /CTV/i.test(c.category||'')}},
  {id:'agency', lbl:'Agency',      cls:'tp-agency', test:function(c){return /agency/i.test(c.category||'')}},
  {id:'pub',    lbl:'Pub',         cls:'tp-pub',    test:function(c){return /publisher/i.test(c.category||'')&&!/DSP|SSP|DMP/i.test(c.category||'')}},
  {id:'data',   lbl:'Data',        cls:'tp-data',   test:function(c){return /data provider/i.test(c.category||'')&&!/DMP|DSP|SSP/i.test(c.category||'')}},
  {id:'prebid', lbl:'Prebid',      cls:'tp-prebid', test:function(c){return Array.isArray(c.tags)&&c.tags.indexOf('prebid')>-1}},
  {id:'prio',   lbl:'Priority',    cls:'tp-prio',   test:function(c){return (c.priority||0)>=1}}
];
window.TAG_DEFS=TAG_DEFS;
window.getTags=function(c){return TAG_DEFS.filter(function(d){return d.test(c);}).map(function(d){return d.id;});};
var _activeTagFilter=null;
var TYPE_ORDER=['dsp','ssp','dmp','agency','pub','id','ctv','data'];

function getKey(){
  for(var i=0;i<document.scripts.length;i++){var m=document.scripts[i].textContent.match(/eyJ[A-Za-z0-9._-]{100,}/);if(m)return m[0];}return '';
}

function fetchAndMergeTags(cb){
  var key=getKey();
  if(!key){if(cb)cb();return;}
  fetch(SB+'/rest/v1/companies?select=id,tags,priority&limit=1000',{headers:{apikey:key,Authorization:'Bearer '+key}})
    .then(function(r){return r.json();})
    .then(function(rows){
      if(!Array.isArray(rows)){if(cb)cb();return;}
      var map={};rows.forEach(function(r){map[r.id]={tags:r.tags||[],priority:r.priority||0};});
      companies.forEach(function(c){var d=map[c.id];if(d){c.tags=d.tags;c.priority=d.priority;}else{c.tags=c.tags||[];c.priority=c.priority||0;}});
      if(cb)cb();
    }).catch(function(){if(cb)cb();});
}

function injectTagRow(){
  if(document.getElementById('fp-tag-row'))return;
  var fp=document.getElementById('filterPills');
  if(!fp)return;
  var row=document.createElement('div');
  row.id='fp-tag-row';
  row.style.cssText='display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;padding-top:5px;border-top:1px solid var(--rule2);width:100%';
  function sep(txt,ml){var s=document.createElement('span');s.className='fp-sep';s.textContent=txt;if(ml)s.style.marginLeft='4px';return s;}
  row.appendChild(sep('Type'));
  TAG_DEFS.slice(0,8).forEach(function(d){
    var b=document.createElement('button');b.className='fp';b.setAttribute('data-tag-id',d.id);b.textContent=d.lbl;
    b.onclick=function(){window.toggleTagFilter(d.id);};row.appendChild(b);
  });
  row.appendChild(sep('Tags',true));
  TAG_DEFS.slice(8).forEach(function(d){
    var b=document.createElement('button');b.className='fp';b.setAttribute('data-tag-id',d.id);
    b.textContent=(d.id==='prio'?STAR+' ':'')+d.lbl;
    b.onclick=function(){window.toggleTagFilter(d.id);};row.appendChild(b);
  });
  fp.appendChild(row);
}

window.toggleTagFilter=function(id){
  document.querySelectorAll('#fp-tag-row .fp').forEach(function(b){b.classList.remove('active');});
  _activeTagFilter=(_activeTagFilter===id)?null:id;
  if(_activeTagFilter){document.querySelectorAll('#fp-tag-row [data-tag-id="'+id+'"]').forEach(function(b){b.classList.add('active');});}
  renderList();
};

function addPillsToRows(){
  document.querySelectorAll('.co-row:not([data-tp])').forEach(function(row){
    row.setAttribute('data-tp','1');
    var oc=row.getAttribute('onclick')||'';
    var parts=oc.split("==='");
    if(parts.length<2)return;
    var name=parts[1].split("'")[0];
    var c=companies.find(function(x){return x.name===name;});
    if(!c)return;
    var tags=window.getTags(c);if(!tags.length)return;
    var firstType=tags.find(function(t){return TYPE_ORDER.indexOf(t)>-1;});
    var firstExtra=tags.find(function(t){return TYPE_ORDER.indexOf(t)===-1;});
    var toShow=[firstType,firstExtra].filter(Boolean).slice(0,2);
    if(!toShow.length)return;
    var wrap=document.createElement('div');wrap.className='row-tags';
    toShow.forEach(function(tid){
      var d=TAG_DEFS.find(function(x){return x.id===tid;});if(!d)return;
      var p=document.createElement('span');p.className='tag-pill '+d.cls;p.textContent=d.lbl;wrap.appendChild(p);
    });
    if(!wrap.children.length)return;
    var right=row.querySelector('.co-right');
    if(right&&!right.querySelector('.row-tags'))right.prepend(wrap);
  });
}

function patchRenderList(){
  var orig=window.renderList;
  window.renderList=function(){
    if(_activeTagFilter){
      var def=TAG_DEFS.find(function(d){return d.id===_activeTagFilter;});
      var saved=companies.slice();
      var filtered=saved.filter(function(c){return def&&def.test(c);});
      companies.length=0;
      for(var i=0;i<filtered.length;i++)companies.push(filtered[i]);
      try{orig();}finally{
        companies.length=0;
        for(var j=0;j<saved.length;j++)companies.push(saved[j]);
      }
    }else{orig();}
    requestAnimationFrame(addPillsToRows);
  };
}

function patchSetFilter(){
  var orig=window.setFilter;
  window.setFilter=function(f,el){
    _activeTagFilter=null;
    document.querySelectorAll('#fp-tag-row .fp').forEach(function(b){b.classList.remove('active');});
    orig(f,el);
  };
}

function patchOpenCompany(){
  var orig=window.openCompany;
  window.openCompany=function(c){
    orig(c);
    setTimeout(function(){
      try{
        var hdr=document.querySelector('.co-hdr-name');
        if(!hdr||hdr.querySelector('.row-tags'))return;
        var tags=window.getTags(c);if(!tags.length)return;
        var wrap=document.createElement('span');
        wrap.className='row-tags';
        wrap.style.cssText='display:flex;gap:3px;flex-wrap:wrap;margin-left:6px;align-items:center';
        tags.slice(0,6).forEach(function(tid){
          var d=TAG_DEFS.find(function(x){return x.id===tid;});if(!d)return;
          var p=document.createElement('span');p.className='tag-pill '+d.cls;
          p.style.cursor='pointer';p.title='Filter: '+d.lbl;p.textContent=d.lbl;
          p.onclick=function(e){e.stopPropagation();window.toggleTagFilter(tid);};
          wrap.appendChild(p);
        });
        if(wrap.children.length)hdr.appendChild(wrap);
      }catch(e){}
    },80);
  };
}

function init(){
  if(typeof companies==='undefined'||!companies.length){setTimeout(init,500);return;}
  patchRenderList();
  patchSetFilter();
  patchOpenCompany();
  fetchAndMergeTags(function(){
    injectTagRow();
    renderList();
  });
}
setTimeout(init,900);
})();
} catch(e){ console.warn('tag-patch error:',e); }
</script>
