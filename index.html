<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>onAudience — Sales Intelligence Hub</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="light"]{
  --bg:#F4F2EC;--surf:#FFFFFF;--surf2:#F8F6F0;--surf3:#EFEDE6;--surf4:#E8E6DE;
  --rule:rgba(0,0,0,0.09);--rule2:rgba(0,0,0,0.05);--rule3:rgba(0,0,0,0.03);
  --t1:#0C0C0A;--t2:#5C5C56;--t3:#9A9990;--t4:#C8C6BC;
  --g:#178066;--gd:#0F6E56;--gb:rgba(23,128,102,0.08);--gr:rgba(23,128,102,0.28);
  --cc:#146B3A;--cb:#E4F5EC;--cr:rgba(20,107,58,0.28);
  --pc:#1A4F8A;--pb:#E6EEFA;--pr:rgba(26,79,138,0.28);
  --prc:#7A4200;--prb:#FEF2E0;--prr:rgba(122,66,0,0.28);
  --nc:#6B6B64;--nb:#EFEDE6;--nr:rgba(107,107,100,0.28);
  --poc:#4B2D9E;--pob:#EDE8FD;--por:rgba(75,45,158,0.28);
  --sh:0 1px 2px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
}
[data-theme="dark"]{
  --bg:#0C0C0A;--surf:#141412;--surf2:#1C1C1A;--surf3:#242421;--surf4:#2E2E2B;
  --rule:rgba(255,255,255,0.08);--rule2:rgba(255,255,255,0.05);--rule3:rgba(255,255,255,0.03);
  --t1:#F0EFE8;--t2:#8A8A82;--t3:#555550;--t4:#38382E;
  --g:#1FA882;--gd:#178066;--gb:rgba(31,168,130,0.1);--gr:rgba(31,168,130,0.3);
  --cc:#4ADE80;--cb:rgba(74,222,128,0.1);--cr:rgba(74,222,128,0.25);
  --pc:#60A5FA;--pb:rgba(96,165,250,0.1);--pr:rgba(96,165,250,0.25);
  --prc:#FBBF24;--prb:rgba(251,191,36,0.1);--prr:rgba(251,191,36,0.25);
  --nc:#55554E;--nb:rgba(85,85,78,0.15);--nr:rgba(85,85,78,0.25);
  --poc:#C084FC;--pob:rgba(192,132,252,0.1);--por:rgba(192,132,252,0.25);
  --sh:0 1px 3px rgba(0,0,0,0.5),0 6px 20px rgba(0,0,0,0.35);
}
[data-theme="dark"] body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px);
  background-size:40px 40px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);
  font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.5;
  transition:background .25s,color .25s}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--surf4);border-radius:2px}

/* APP SHELL */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;z-index:1}

/* NAV */
.nav{background:var(--surf);border-bottom:1px solid var(--rule);display:flex;align-items:center;height:42px;padding:0 14px;gap:10px;flex-shrink:0}
.nav-logo{width:26px;height:26px;background:var(--g);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:9px;color:#fff;letter-spacing:-0.5px;flex-shrink:0}
.nav-title{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding-right:12px;border-right:1px solid var(--rule);color:var(--t1);white-space:nowrap}
.nav-title span{color:var(--t3);font-weight:400}
.nav-status{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--t4);transition:background .3s}
.status-dot.live{background:#22C55E}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.btn{height:26px;padding:0 10px;border:1px solid var(--rule);border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;background:var(--surf2);color:var(--t2);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surf3);color:var(--t1)}
.btn.p{background:var(--g);color:#fff;border-color:var(--g)}
.btn.p:hover{background:var(--gd)}
.btn.sm{height:22px;padding:0 7px;font-size:8px}
.theme-btn{width:26px;height:26px;border:1px solid var(--rule);border-radius:2px;background:var(--surf2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .15s;color:var(--t2)}
.theme-btn:hover{background:var(--surf3)}

/* STATS BAR */
.stats-bar{background:var(--surf);border-bottom:1px solid var(--rule);display:grid;grid-template-columns:repeat(7,1fr);flex-shrink:0}
.sc{padding:8px 12px 7px;border-right:1px solid var(--rule);cursor:pointer;transition:background .15s;user-select:none}
.sc:last-child{border-right:none}
.sc:hover{background:var(--surf2)}
.sc.active{background:var(--gb);border-bottom:2px solid var(--g)}
.sc-num{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:300;letter-spacing:-1px;line-height:1;color:var(--t1)}
.sc-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-top:2px}

/* TAG */
.tag{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;padding:1px 5px;border-radius:2px;border:1px solid;white-space:nowrap;flex-shrink:0}
.tc{color:var(--cc);background:var(--cb);border-color:var(--cr)}
.tp{color:var(--pc);background:var(--pb);border-color:var(--pr)}
.tpr{color:var(--prc);background:var(--prb);border-color:var(--prr)}
.tn{color:var(--nc);background:var(--nb);border-color:var(--nr)}
.tpo{color:var(--poc);background:var(--pob);border-color:var(--por)}

/* PANELS */
.panels{display:flex;flex:1;overflow:hidden}

/* LEFT */
.left{width:320px;flex-shrink:0;border-right:1px solid var(--rule);background:var(--surf);display:flex;flex-direction:column;overflow:hidden}
.tab-bar{display:flex;border-bottom:1px solid var(--rule);flex-shrink:0}
.tab{flex:1;height:32px;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{background:var(--surf2);color:var(--t1)}
.tab.active{color:var(--g);border-bottom-color:var(--g)}
.search-row{display:flex;gap:6px;padding:8px;flex-shrink:0;border-bottom:1px solid var(--rule2)}
.sinp{flex:1;height:28px;padding:0 8px;border:1px solid var(--rule);border-radius:2px;background:var(--surf2);color:var(--t1);font-family:'IBM Plex Mono',monospace;font-size:11px;outline:none;transition:border-color .15s}
.sinp::placeholder{color:var(--t3)}
.sinp:focus{border-color:var(--gr)}
.fp-row{display:flex;gap:4px;padding:6px 8px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid var(--rule2)}
.fp{height:20px;padding:0 8px;border:1px solid var(--rule);border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;background:transparent;color:var(--t3);transition:all .12s;white-space:nowrap}
.fp:hover:not(.active){background:var(--surf3);color:var(--t1)}
.fp.active{background:var(--t1);color:var(--surf);border-color:var(--t1)}
.list-meta{padding:4px 10px;border-bottom:1px solid var(--rule3);flex-shrink:0;display:flex;justify-content:space-between}
.list-meta span{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3)}
.co-list{overflow-y:auto;flex:1}

/* COMPANY ROW */
.co-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--rule3);cursor:pointer;transition:background .1s;user-select:none}
.co-row:hover{background:var(--surf2)}
.co-row.selected{background:var(--gb);border-left:2px solid var(--g);padding-left:8px}
.av{width:28px;height:28px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;border:1px solid transparent}
.rn{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1)}
.rno{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.co-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.icp-n{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t4);min-width:14px;text-align:right}

/* CONTACTS TAB */
.ct-row-li{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--rule3);cursor:pointer;transition:background .1s}
.ct-row-li:hover{background:var(--surf2)}
.ct-av-sm{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;background:var(--pb);color:var(--pc);border:1px solid var(--pr)}
.ct-name-sm{font-size:12px;font-weight:500;color:var(--t1)}
.ct-role-sm{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);margin-top:1px}
.ct-co-sm{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t4)}

/* CENTER */
.center{flex:1;overflow-y:auto;background:var(--surf2);position:relative}

/* EMPTY STATE */
.empty-state{padding:24px;max-width:600px;margin:0 auto}
.es-title{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:14px}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qa-card{background:var(--surf);border:1px solid var(--rule);border-radius:3px;padding:14px;cursor:pointer;transition:border-color .15s,background .15s}
.qa-card:hover{border-color:var(--gr);background:var(--gb)}
.qa-icon{font-size:16px;margin-bottom:6px}
.qa-title{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:2px}
.qa-desc{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3)}

/* COMPANY PANEL */
.co-panel{padding:14px;max-width:720px}
.co-banner{background:var(--surf);border:1px solid var(--rule);border-radius:3px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;box-shadow:var(--sh)}
.co-logo{width:40px;height:40px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.co-hdr{flex:1;min-width:0}
.co-hdr-name{font-size:16px;font-weight:500;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.co-domain{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t3)}
.co-sub{font-size:11px;color:var(--t2);margin-top:3px}
.icp-row{display:flex;align-items:center;gap:8px;margin-top:5px}
.stars{color:var(--g);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:1px}
.icp-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3)}
.sec{background:var(--surf);border:1px solid var(--rule);border-radius:3px;overflow:hidden;margin-bottom:8px;box-shadow:var(--sh)}
.sec-hdr{background:var(--surf2);padding:6px 12px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.sec-hdr-label{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)}
.sec-body{padding:10px 12px}
table.info{width:100%;border-collapse:collapse;font-size:12px}
table.info tr td{padding:4px 0;vertical-align:top;border-bottom:1px solid var(--rule3)}
table.info tr:last-child td{border-bottom:none}
table.info tr td:first-child{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t3);width:120px;padding-right:10px;text-transform:uppercase;letter-spacing:.04em}
.note-bar{background:var(--surf2);border-left:2px solid var(--g);padding:8px 12px;font-size:11px;color:var(--t2);margin-top:8px;line-height:1.6}
.btn-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.contact-card{background:var(--surf2);border:1px solid var(--rule);border-radius:3px;padding:10px 12px;margin-bottom:5px}
.contact-card:last-child{margin-bottom:0}
.ct-av-r{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;background:var(--pb);color:var(--pc);border:1px solid var(--pr);flex-shrink:0}
table.info2{width:100%;border-collapse:collapse;font-size:11px}
table.info2 tr td{padding:3px 0;vertical-align:top;border-bottom:1px solid var(--rule3)}
table.info2 tr:last-child td{border-bottom:none}
table.info2 tr td:first-child{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);width:70px;text-transform:uppercase;letter-spacing:.04em}
.code-pill{font-family:'IBM Plex Mono',monospace;font-size:10px;background:var(--surf3);border:1px solid var(--rule);border-radius:2px;padding:1px 5px;color:var(--t1)}
a.ml{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--g);text-decoration:none}
a.ml:hover{text-decoration:underline}
.no-rel{background:var(--surf2);border:1px solid var(--rule);border-radius:3px;padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.close-btn{width:26px;height:26px;border:1px solid var(--rule);border-radius:2px;background:transparent;cursor:pointer;font-size:14px;color:var(--t3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.close-btn:hover{background:var(--surf3);color:var(--t1)}

/* OVERVIEW 2-COL */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:start}
.overview-col{padding:0}
.overview-divider{width:1px;background:var(--rule);margin:0 14px;align-self:stretch}
.ts-label{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:7px}
.ts-pills{display:flex;flex-wrap:wrap;gap:4px}
.ts-pill{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid;white-space:nowrap}
/* DSP tier */
.ts-dsp{color:#1A4F8A;background:#E6EEFA;border-color:rgba(26,79,138,0.28)}
/* DMP/CDP */
.ts-cdp{color:#4B2D9E;background:#EDE8FD;border-color:rgba(75,45,158,0.28)}
/* Marketplace/Identity */
.ts-id{color:#146B3A;background:#E4F5EC;border-color:rgba(20,107,58,0.28)}
/* Clean room / data infra */
.ts-infra{color:#7A4200;background:#FEF2E0;border-color:rgba(122,66,0,0.28)}
/* Neutral/unknown */
.ts-other{color:var(--nc);background:var(--nb);border-color:var(--nr)}
.ts-empty{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t4);font-style:italic}

/* WEBSITE TECH SCAN */
.wt-loading{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t3)}
.wt-spinner{width:10px;height:10px;border:2px solid var(--rule);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.wt-error{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);padding:6px 0}
.wt-group{margin-bottom:10px}
.wt-group:last-child{margin-bottom:0}
.wt-group-label{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.wt-pills{display:flex;flex-wrap:wrap;gap:4px}
.wt-pill{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid;white-space:nowrap;cursor:default}
/* by category */
.wt-analytics{color:#1A4F8A;background:#E6EEFA;border-color:rgba(26,79,138,0.28)}
.wt-ads{color:#7A4200;background:#FEF2E0;border-color:rgba(122,66,0,0.28)}
.wt-retargeting{color:#4B2D9E;background:#EDE8FD;border-color:rgba(75,45,158,0.28)}
.wt-crm{color:#146B3A;background:#E4F5EC;border-color:rgba(20,107,58,0.28)}
.wt-cdp{color:#993556;background:#FCEEF4;border-color:rgba(153,53,86,0.28)}
.wt-tag{color:var(--nc);background:var(--nb);border-color:var(--nr)}
.wt-other{color:var(--nc);background:var(--nb);border-color:var(--nr)}
.wt-cache-note{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t4);margin-top:8px}

/* ACTION LOG */
#actionLog{position:fixed;bottom:0;left:320px;right:0;background:var(--surf);border-top:1px solid var(--rule);z-index:500;max-height:120px;overflow-y:auto;display:none}
#actionLog.vis{display:block}
.alog-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 12px;border-bottom:1px solid var(--rule2)}
.alog-hdr span{font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)}
.alog-entry{display:flex;align-items:center;gap:8px;padding:3px 12px;border-bottom:1px solid var(--rule3);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t2)}
.alog-entry:last-child{border-bottom:none}
.alog-ts{color:var(--t4);flex-shrink:0;min-width:48px}
.alog-ico{flex-shrink:0}
.alog-act{color:var(--g);font-weight:500}
.alog-co{color:var(--t2)}

/* CONTEXT MENU */
#ctxMenu{position:fixed;background:var(--surf);border:1px solid var(--rule);border-radius:3px;padding:5px;z-index:9998;min-width:220px;box-shadow:var(--sh);display:none}
.ctx-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);padding:4px 10px 3px;text-transform:uppercase;letter-spacing:.05em}
.ctx-sep{height:1px;background:var(--rule);margin:4px 0}
.ctx-item{display:flex;align-items:center;gap:8px;padding:7px 10px;font-size:12px;color:var(--t1);border-radius:2px;cursor:pointer;transition:background .1s}
.ctx-item:hover{background:var(--surf2)}
.ctx-ico{font-size:12px;width:16px;text-align:center}

/* CONTACT DRAWER */
#drawer{position:fixed;top:0;right:-400px;width:380px;height:100vh;background:var(--surf);border-left:1px solid var(--rule);z-index:9997;overflow-y:auto;transition:right .25s ease;box-shadow:-4px 0 20px rgba(0,0,0,0.1)}
#drawer.open{right:0}
#drawerOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.2);z-index:9996;display:none}
#drawerOverlay.vis{display:block}
.drawer-nav{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--rule)}
.drawer-title{flex:1;font-size:14px;font-weight:500}

/* RESEARCH MODAL */
#researchOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#researchOverlay.vis{display:flex}
.modal-box{background:var(--surf);border:1px solid var(--rule);border-radius:4px;padding:20px;max-width:480px;width:90%;box-shadow:var(--sh)}
.modal-box h2{font-size:15px;font-weight:500;margin-bottom:6px}
.modal-box p{font-size:12px;color:var(--t2);margin-bottom:12px}
.modal-ta{width:100%;height:80px;padding:8px 10px;border:1px solid var(--rule);border-radius:2px;font-size:13px;background:var(--surf2);color:var(--t1);resize:vertical;outline:none;font-family:inherit;line-height:1.5}
.modal-ta:focus{border-color:var(--gr)}
.modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:10px}
</style>
</head>
<body>
<div class="app">

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo">oA</div>
    <span class="nav-title">Sales Intelligence Hub <span>/ onAudience</span></span>
    <div class="nav-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Loading…</span>
    </div>
    <div class="nav-right">

async function loadLiveData() {
  try {
    const [cRes, ctRes] = await Promise.all([
      fetch(`${SB_URL}/rest/v1/companies?select=*&order=name.asc`, {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}),
      fetch(`${SB_URL}/rest/v1/contacts?select=*&order=company_name.asc`, {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}})
    ]);
    if (!cRes.ok || !ctRes.ok) throw new Error(`API ${cRes.status}/${ctRes.status}`);
    const [cData, ctData] = await Promise.all([cRes.json(), ctRes.json()]);
    if (Array.isArray(cData) && cData.length) {
      companies = cData.map(r => ({
        name: r.name||'', note: r.note||'', type: r.type||'prospect',
        category: r.category||null, region: r.region||null, size: r.size||null,
        icp: r.icp||null, website: r.website||null, linkedin_slug: r.linkedin_slug||null,
        updated_at: r.updated_at||null,
        description: r.description||null, hq_city: r.hq_city||null,
        founded_year: r.founded_year||null, funding: r.funding||null,
        revenue_est: r.revenue_est||null, funding_stage: r.funding_stage||null,
        acquisition_status: r.acquisition_status||null, parent_company: r.parent_company||null,

        priority: r.priority||0, outreach_angle: r.outreach_angle||null,
        relationship_owner: r.relationship_owner||null, deal_stage: r.deal_stage||null,
        deal_value_est: r.deal_value_est||null, next_action: r.next_action||null,
        next_action_at: r.next_action_at||null, last_contacted_at: r.last_contacted_at||null,
        dsps: r.dsps||[], tech_stack: r.tech_stack||[], signals: r.signals||[],
        press_links: r.press_links||[], hiring_signals: r.hiring_signals||[],
        competitors: r.competitors||[], offices: r.offices||[],

function _buildCoMap() {
  const m = {};
  companies.forEach((c,i) => { m[c.name.toLowerCase()] = i; });
  return m;
}
function _findCompany(name) {
  return companies.find(c => c.name.toLowerCase() === name.toLowerCase()) || null;
}

function classify(n) {
  const s = (n||'').toLowerCase();
  if (s.includes('no outreach')||s.includes('no fit')||s.includes('no business')||s.includes('internal')||s.includes('closed')||s.includes('unwanted')) return 'nogo';
  if (s.includes('poc client')||s.includes('active poc')) return 'poc';
  if (s.includes('client')) return 'client';
  if (s.includes('partner')) return 'partner';
  if (s.includes('prospect')||s.includes('to check')||s.includes('to continue')) return 'prospect';
  return 'prospect';
}

function tagCls(t) { return {client:'tc',partner:'tp',prospect:'tpr',nogo:'tn',poc:'tpo'}[t]||'tpr'; }
function tagLbl(t) { return {client:'Client',partner:'Partner',prospect:'Prospect',nogo:'No outreach',poc:'POC'}[t]||'Prospect'; }

function av(name) {
  const p=[['#9FE1CB30','#0F6E56'],['#B5D4F430','#1A4F8A'],['#FAC77530','#7A4200'],['#C0DD9730','#3B6D11'],['#F4C0D130','#993556']];
  let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))&0xffff;
  return p[h%p.length];
}
function ini(n) {
  return n.replace(/[^A-Za-z ]/g,'').split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase()||'?';
}
function stars(n) {
  if (!n) return '';
  return '★'.repeat(Math.min(5,Math.round(n/2)))+'☆'.repeat(Math.max(0,5-Math.min(5,Math.round(n/2))));
}
function isFresh(c) {
  if (c.type !== 'prospect') return false;
  const hasContact = contacts.some(ct => ct.company_name && ct.company_name.toLowerCase() === c.name.toLowerCase());
  if (hasContact) return false;
  if (!c.updated_at) return true;
  const days = (Date.now() - new Date(c.updated_at).getTime()) / 86400000;
  return days > 30;
}

/* ── DB CACHE HELPERS ── */
const CACHE_TTL_HOURS = 168; // 7 days

async function _dbCacheRead(companyId) {
  try {
    const r = await fetch(
      `${SB_URL}/rest/v1/enrich_cache?company_id=eq.${encodeURIComponent(companyId)}&source=eq.web_tech&order=fetched_at.desc&limit=1`,
      { headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } }
    );
    if (!r.ok) return null;
    const rows = await r.json();
    if (!rows.length) return null;
    const row = rows[0];
    const ageHours = (Date.now() - new Date(row.fetched_at).getTime()) / 3600000;
    if (ageHours > row.ttl_hours) return null; // stale
    return row.data; // JSONB — the groups object
  } catch { return null; }
}

async function _dbCacheWrite(companyId, groups) {
  try {
    await fetch(`${SB_URL}/rest/v1/enrich_cache`, {
      method: 'POST',
      headers: {
        apikey: SB_KEY,
        Authorization: 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        Prefer: 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({
        company_id: companyId,
        source: 'web_tech',
        data: groups,
        fetched_at: new Date().toISOString(),
        ttl_hours: CACHE_TTL_HOURS
      })
    });
    // also stamp last_enriched_at on the company record
    await fetch(
      `${SB_URL}/rest/v1/companies?id=eq.${encodeURIComponent(companyId)}`,
      {
        method: 'PATCH',
        headers: {
          apikey: SB_KEY,
          Authorization: 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify({
          tech_stack_cache: groups,
          last_enriched_at: new Date().toISOString()
        })
      }
    );
  } catch(e) { console.warn('[oA Hub] Cache write failed:', e.message); }
}

function _coIdFromName(name) {
  // derive slug from name — mirrors store-data skill convention
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

async function scanWebTech(companyName, domain, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;

  const coId = _coIdFromName(companyName);

  // 1. Session memory (instant)
  if (_wtCache.has(companyName)) {
    const cached = _wtCache.get(companyName);
    el.innerHTML = renderWtGroups(cached.groups) +
      `<div class="wt-cache-note">Session cache · ${cached.ts}</div>`;
    return;
  }

  if (!domain) {
    el.innerHTML = `<div class="wt-error">No website domain — add one to run scan.</div>`;
    return;
  }

  // 2. DB cache (across sessions)
  el.innerHTML = `<div class="wt-loading"><div class="wt-spinner"></div>Checking cache…</div>`;
  const dbGroups = await _dbCacheRead(coId);
  if (dbGroups) {
    const ts = new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
    _wtCache.set(companyName, { groups: dbGroups, ts });
    el.innerHTML = renderWtGroups(dbGroups) +
      `<div class="wt-cache-note">DB cache · <7 days old · <button class="btn sm" style="display:inline-flex;height:16px;padding:0 5px;font-size:7px" onclick="trackAction('🔬','Tech rescan','${companyName.replace(/'/g,"\\'")}');_wtCache.delete('${companyName.replace(/'/g,"\\'")}');scanWebTech('${companyName.replace(/'/g,"\\'")}','${domain}','${targetId}',true)">Force rescan</button></div>`;
    trackAction('💾', 'Tech loaded from DB cache', companyName);
    return;
  }

  trackAction('🔬', 'Tech scan started', companyName);
  el.innerHTML = `<div class="wt-loading"><div class="wt-spinner"></div>Scanning ${domain}…</div>`;

  // determine company type for interpretation mode
  const coData = companies.find(x => x.name === companyName);
  const cat = ((coData && coData.category)||'').toLowerCase();
  const mode = cat.includes('agency') || cat.includes('holding') ? 'agency'
    : cat.includes('dsp') || cat.includes('ssp') || cat.includes('adtech') || cat.includes('programmatic') ? 'adtech'
    : cat.includes('data provider') || cat.includes('dmp') || cat.includes('cdp') ? 'dataprovider'
    : cat.includes('publisher') || cat.includes('media') ? 'publisher'
    : cat.includes('brand') || cat.includes('advertiser') || cat.includes('retail') ? 'brand'
    : 'unknown';

  const modeNote = mode === 'agency'
    ? `IMPORTANT: This is an AGENCY (${cat}). Their website tech reflects their own marketing/CRM, NOT their clients' media buying. CMP tools (OneTrust, Cookiebot) mean they meet their own legal obligations — nothing more. DSP pixels on their site are their own new-biz retargeting, not evidence their trading desk uses that DSP for clients. Mark CMP and retargeting signals clearly as "own marketing only" — do not present them as buying signals.`
    : mode === 'adtech' || mode === 'dataprovider'
    ? `This is an ADTECH/DATA company. DSP pixels likely reflect their own marketing retargeting. CMP tools are their own compliance posture — not a statement about whether their data exports are consent-verified. Only LiveRamp/ID5/Segment/Tealium are genuine integration signals.`
    : mode === 'publisher'
    ? `This is a PUBLISHER. DSP pixels = real demand partners. CMP = meaningful consent posture for their own audience data — this IS a valid signal for data partnership conversations.`
    : mode === 'brand'
    ? `This is a BRAND/ADVERTISER. All buying signals (TTD, DV360, Meta, LiveRamp) read at face value — their website IS their media buying stack.`
    : `Company type unknown — use conservative interpretation. Flag all signals as needing verification.`;

  const prompt = `You are a web technology analyst. Search for the technology stack used on the website ${domain}.

${modeNote}

Identify all third-party technologies: analytics, ad pixels, DSP tags, retargeting scripts, CRM/marketing automation, CDP/DMP platforms, consent management (CMP), tag managers, identity tools, and any programmatic advertising infrastructure.

Respond ONLY with a valid JSON object. No markdown, no backticks, no explanation. Structure:
{
  "analytics": ["Google Analytics 4", "Hotjar"],
  "ads": ["Google Ads", "The Trade Desk"],
  "retargeting": ["LinkedIn Insight Tag", "Meta Pixel"],
  "crm": ["HubSpot"],
  "cdp": ["Segment", "Tealium"],
  "identity": ["LiveRamp", "ID5"],
  "tag": ["Google Tag Manager"],
  "cmp": ["OneTrust"],
  "other": ["Cloudflare", "Intercom"],
  "mode": "${mode}",
  "buying_signals": ["list only tools that are genuine buying/integration signals for a ${mode} — omit own-marketing-only tools"],
  "gaps": ["list what website tech CANNOT tell us about this company's actual media buying / data usage"]
}
Only include tool categories that have at least one tool found. If you cannot access the site, return {"error": "Could not access site"}.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!resp.ok) throw new Error(`API ${resp.status}`);
    const data = await resp.json();

    // extract text block
    const textBlocks = (data.content || []).filter(b => b.type === 'text');
    const raw = textBlocks.map(b => b.text).join('');

    // strip any accidental markdown fences
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    if (parsed.error) {
      el.innerHTML = `<div class="wt-error">⚠ ${parsed.error}</div>`;
      trackAction('⚠', 'Tech scan failed', companyName);
      return;
    }

    // build groups — keep tool arrays + metadata fields
    const groups = {};
    for (const [k, v] of Object.entries(parsed)) {
      if (Array.isArray(v) && v.length) groups[k] = v;
      else if (!Array.isArray(v) && ['mode','buying_signals','gaps'].includes(k)) groups[k] = v;
    }
    // ensure mode always present
    if (!groups.mode) groups.mode = mode;

    const ts = new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
    _wtCache.set(companyName, { groups, ts });

    // persist to DB (fire-and-forget — don't block render)
    _dbCacheWrite(coId, groups);

    el.innerHTML = renderWtGroups(groups) + `<div class="wt-cache-note">Live scan · ${ts} · saved to DB</div>`;
    trackAction('✅', 'Tech scan complete', `${companyName} · ${Object.values(groups).flat().filter(Array.isArray).flat().length} tools found`);

  } catch(e) {
    console.error('[oA Hub] Tech scan error:', e);
    el.innerHTML = `<div class="wt-error">⚠ Scan failed — ${e.message}. <button class="btn sm" onclick="scanWebTech('${companyName.replace(/'/g,"\\'")}','${domain}','${targetId}')">Retry</button></div>`;
    trackAction('❌', 'Tech scan error', companyName);
  }
}

function renderWtGroups(groups) {
  const mode = groups.mode || 'unknown';
  const mm = WT_MODE_META[mode] || WT_MODE_META.unknown;
  const buyingSignals = Array.isArray(groups.buying_signals) ? groups.buying_signals : [];
  const gaps = Array.isArray(groups.gaps) ? groups.gaps : [];

  const toolOrder = ['identity','ads','retargeting','cdp','analytics','crm','tag','cmp','other'];
  const toolKeys = toolOrder.filter(k => Array.isArray(groups[k]) && groups[k].length)
    .concat(Object.keys(groups).filter(k =>
      !toolOrder.includes(k) && !['mode','buying_signals','gaps'].includes(k)
      && Array.isArray(groups[k]) && groups[k].length
    ));

  if (!toolKeys.length) return `<div class="wt-error">No technologies detected.</div>`;

  // mode banner
  let html = `<div style="display:flex;align-items:center;gap:7px;margin-bottom:9px;padding:4px 8px;background:var(--surf2);border:1px solid var(--rule);border-radius:2px">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:500;color:${mm.accent};text-transform:uppercase;letter-spacing:.06em;flex-shrink:0">${mm.label}</span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--t3)">${mm.note}</span>
  </div>`;

  // tool groups
  html += toolKeys.map(cat => {
    const meta = WT_CATEGORIES[cat] || { label: cat, icon: '⚙️', cls: 'wt-other' };
    const isCmpCat = cat === 'cmp' || cat === 'tag';
    const isAdCat  = cat === 'ads' || cat === 'retargeting';
    let caveat = '';
    if (isCmpCat && mode === 'agency')       caveat = ' — own legal obligation only';
    else if (isCmpCat && mode === 'dataprovider') caveat = ' — own compliance, not data exports';
    else if (isAdCat  && mode === 'agency')   caveat = ' — own new-biz retargeting';
    else if (isAdCat  && (mode === 'adtech' || mode === 'dataprovider')) caveat = ' — own marketing';

    const pills = groups[cat].map(t => {
      const isSignal = buyingSignals.includes(t);
      const dim = !isSignal && mode !== 'brand' && mode !== 'unknown';
      return `<span class="wt-pill ${isSignal ? meta.cls : 'wt-other'}" style="${dim ? 'opacity:0.45' : ''}" title="${isSignal ? '✅ Genuine signal' : 'ℹ Own marketing / informational'}">${t}</span>`;
    }).join('');

    return `<div class="wt-group">
      <div class="wt-group-label">${meta.icon} ${meta.label}${caveat ? `<span style="font-weight:400;letter-spacing:0;text-transform:none;color:var(--t4)">${caveat}</span>` : ''}</div>
      <div class="wt-pills">${pills}</div>
    </div>`;
  }).join('');

  // genuine signals block
  if (buyingSignals.length) {
    html += `<div style="margin-top:10px;padding:6px 8px;background:var(--gb);border:1px solid var(--gr);border-radius:2px">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--g);margin-bottom:5px">✅ Genuine signals</div>
      <div class="wt-pills">${buyingSignals.map(s=>`<span class="wt-pill wt-crm">${s}</span>`).join('')}</div>
    </div>`;
  }

  // gaps block
  if (gaps.length) {
    html += `<div style="margin-top:6px;padding:6px 8px;background:var(--surf2);border:1px solid var(--rule);border-radius:2px">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:4px">⚠ Website cannot answer</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t2);line-height:1.7">${gaps.map(g=>`· ${g}`).join('<br>')}</div>
    </div>`;
  }

  return html;
}

          ${liUrl ? `<tr><td>Company LI</td><td><a class="ml" href="${liUrl}" target="_blank" onclick="trackAction('in','Opened company LinkedIn','${cname}')">${liUrl} ↗</a></td></tr>` : ''}
          ${c.website ? `<tr><td>Website</td><td><a class="ml" href="https://${c.website.replace(/^https?:\/\//,'')}" target="_blank" onclick="trackAction('🌐','Opened website','${cname}')">${c.website} ↗</a></td></tr>` : ''}
        </table>
      </div>
    </div>
  </div>`;

  document.getElementById('center').innerHTML = html;
  // trigger web tech scan after DOM is painted
  requestAnimationFrame(() => scanWebTech(c.name, domain, `wtResult_${idx}`));
}

/* ── CONTEXT MENU ── */
function showCtx(e, idx) {
  e.preventDefault(); e.stopPropagation();
  const c = companies[idx];
  const menu = document.getElementById('ctxMenu');
  var actions = [
    {ico:'🔍',lbl:'Full contact report',prompt:`Research ${c.name} — full contact report with decision makers, outreach angle, and ICP fit score for onAudience`},
    {ico:'👤',lbl:'Find decision makers',prompt:`Find Head of Programmatic or Data Partnerships at ${c.name} — LinkedIn, email, background`},
    {ico:'✉',lbl:'Draft outreach email',prompt:`Draft a personalized outreach email to ${c.name} — value-led and curiosity variants for onAudience data partnership`},
    {ico:'💬',lbl:'LinkedIn message',prompt:`Draft a LinkedIn connection note and InMail for ${c.name} — short, personalized for data partnership`},
    {ico:'🔗',lbl:'Find similar companies',prompt:`Find companies similar to ${c.name} for onAudience outreach — top 10 ranked by ICP fit`},
    {ico:'📧',lbl:'Check email history',prompt:`Check Gmail for any previous contact with ${c.name} — summarize relationship history`},
  ];
  if (c.type === 'nogo') actions.push({ico:'⚠️',lbl:'Why no outreach?',prompt:`Explain why ${c.name} is marked no-outreach in onAudience database`});
  if (c.type === 'prospect') actions.push({ico:'🚀',lbl:'Prioritize this account',prompt:`Build a prioritization case for ${c.name} — why should onAudience contact them this quarter?`});

  menu.innerHTML = `<div class="ctx-lbl">${c.name}</div><div class="ctx-sep"></div>`
    + actions.map((a,i) => `<div class="ctx-item" data-i="${i}"><span class="ctx-ico">${a.ico}</span>${a.lbl}</div>`).join('');
  menu.querySelectorAll('.ctx-item').forEach((el,i) => {
    el.addEventListener('click', () => {
      menu.style.display='none';
      trackAction(actions[i].ico, actions[i].lbl, c.name);
      openClaude(actions[i].prompt);
    });
  });
  const x = Math.min(e.clientX, window.innerWidth-240);
  const y = Math.min(e.clientY, window.innerHeight-320);
  menu.style.left = x+'px'; menu.style.top = y+'px'; menu.style.display = 'block';
}
document.addEventListener('click', () => { document.getElementById('ctxMenu').style.display='none'; });

/* ── RESEARCH MODAL ── */
let _modalTemplate = '';
function openResearch() {
  promptResearch('Research a company', 'Enter company name to generate a full contact report.', 'Research [COMPANY] for onAudience — full contact report: decision makers, tech stack, outreach angle, ICP fit');
}
function promptResearch(title, desc, tpl) {
  _modalTemplate = tpl;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc;
  document.getElementById('modalInput').value = '';
  document.getElementById('researchOverlay').classList.add('vis');
  setTimeout(() => document.getElementById('modalInput').focus(), 60);
}
function closeResearch() { document.getElementById('researchOverlay').classList.remove('vis'); }
function submitResearch() {
  const val = document.getElementById('modalInput').value.trim();
  if (!val) return;
  closeResearch();
  trackAction('🔍', 'Research submitted', val);
  openClaude(_modalTemplate.replace('[COMPANY]', val));
}
function doSearchResearch() {
  const q = document.getElementById('searchQ').value.trim();
  if (q) {
    trackAction('🔍', 'Search research', q);
    openClaude(`Research ${q} for onAudience — full contact report: decision makers, tech stack, outreach angle, ICP fit`);
  } else openResearch();
}

/* ── THEME ── */
let theme = localStorage.getItem('oaTheme') || 'light';
document.documentElement.setAttribute('data-theme', theme);
function toggleTheme() {
  theme = theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('oaTheme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
}
document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';

/* ── DOMContentLoaded: init ── */
document.addEventListener('DOMContentLoaded', () => {
  const mi = document.getElementById('modalInput');
  if (mi) mi.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitResearch();} });
  document.getElementById('researchOverlay').addEventListener('click', e => { if (e.target===document.getElementById('researchOverlay')) closeResearch(); });
});

window.addEventListener('message', e => {
  if (!e.data?.type) return;
  if (e.data.type === 'THEME_SYNC') {
    theme = e.data.payload?.theme || theme;
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('oaTheme', theme);
    document.getElementById('themeBtn').textContent = theme === 'dark' ? '\u2600\ufe0f' : '\ud83c\udf19';

});
