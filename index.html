<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>onAudience — Sales Intelligence Hub</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="light"]{--bg:#F4F2EC;--surf:#FFFFFF;--surf2:#F8F6F0;--surf3:#EFEDE6;--surf4:#E8E6DE;--rule:rgba(0,0,0,0.09);--rule2:rgba(0,0,0,0.05);--rule3:rgba(0,0,0,0.03);--t1:#0C0C0A;--t2:#5C5C56;--t3:#9A9990;--t4:#C8C6BC;--g:#178066;--gd:#0F6E56;--gb:rgba(23,128,102,0.08);--gr:rgba(23,128,102,0.28);--cc:#146B3A;--cb:#E4F5EC;--cr:rgba(20,107,58,0.28);--pc:#1A4F8A;--pb:#E6EEFA;--pr:rgba(26,79,138,0.28);--prc:#7A4200;--prb:#FEF2E0;--prr:rgba(122,66,0,0.28);--nc:#6B6B64;--nb:#EFEDE6;--nr:rgba(107,107,100,0.28);--poc:#4B2D9E;--pob:#EDE8FD;--por:rgba(75,45,158,0.28);--sh:0 1px 2px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04)}
[data-theme="dark"]{--bg:#0C0C0A;--surf:#141412;--surf2:#1C1C1A;--surf3:#242421;--surf4:#2E2E2B;--rule:rgba(255,255,255,0.08);--rule2:rgba(255,255,255,0.05);--rule3:rgba(255,255,255,0.03);--t1:#F0EFE8;--t2:#8A8A82;--t3:#555550;--t4:#38382E;--g:#1FA882;--gd:#178066;--gb:rgba(31,168,130,0.1);--gr:rgba(31,168,130,0.3);--cc:#4ADE80;--cb:rgba(74,222,128,0.1);--cr:rgba(74,222,128,0.25);--pc:#60A5FA;--pb:rgba(96,165,250,0.1);--pr:rgba(96,165,250,0.25);--prc:#FBBF24;--prb:rgba(251,191,36,0.1);--prr:rgba(251,191,36,0.25);--nc:#55554E;--nb:rgba(85,85,78,0.15);--nr:rgba(85,85,78,0.25);--poc:#C084FC;--pob:rgba(192,132,252,0.1);--por:rgba(192,132,252,0.25);--sh:0 1px 3px rgba(0,0,0,0.5),0 6px 20px rgba(0,0,0,0.35)}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:13px;line-height:1.5;transition:background .25s,color .25s}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--surf4);border-radius:2px}
.topnav{background:var(--surf);border-bottom:1px solid var(--rule);display:flex;align-items:center;height:42px;padding:0 18px;gap:0;position:sticky;top:0;z-index:100}
.nav-logo{width:26px;height:26px;background:var(--g);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:9px;color:#fff;letter-spacing:-0.5px;flex-shrink:0}
.nav-brand{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-left:10px;padding-right:14px;border-right:1px solid var(--rule);color:var(--t1);white-space:nowrap}
.nav-sub{color:var(--t3);font-weight:400}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.synced{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t3);padding:2px 8px;border:1px solid var(--rule);border-radius:2px}
.dot{width:5px;height:5px;border-radius:50%;background:#22C55E}
.theme-btn{width:26px;height:26px;border:1px solid var(--rule);border-radius:2px;background:var(--surf2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .15s;color:var(--t2)}
.theme-btn:hover{background:var(--surf3)}
.stats-bar{background:var(--surf);border-bottom:1px solid var(--rule);display:grid;grid-template-columns:repeat(7,1fr)}
.sc{padding:9px 14px 8px;border-right:1px solid var(--rule);cursor:pointer;transition:background .15s}
.sc:last-child{border-right:none}
.sc:hover{background:var(--surf2)}
.sc.active{background:var(--gb);border-bottom:2px solid var(--g)}
.sn{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:300;letter-spacing:-1px;line-height:1;color:var(--t1)}
.sl{font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-top:3px}
.search-bar{background:var(--surf);border-bottom:1px solid var(--rule);padding:7px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sbox{position:relative;flex:1;min-width:180px}
.sico{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3);font-family:'IBM Plex Mono',monospace;font-size:10px;pointer-events:none}
.sinp{width:100%;height:28px;padding:0 8px 0 24px;border:1px solid var(--rule);border-radius:2px;background:var(--surf2);color:var(--t1);font-family:'IBM Plex Mono',monospace;font-size:11px;outline:none;transition:border-color .15s}
.sinp::placeholder{color:var(--t3)}.sinp:focus{border-color:var(--gr)}
.fpills{display:flex;gap:4px;flex-wrap:wrap}
.fp{height:22px;padding:0 9px;border:1px solid var(--rule);border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;background:transparent;color:var(--t3);transition:all .12s;white-space:nowrap}
.fp:hover:not(.active){background:var(--surf3);color:var(--t1)}
.fp.active{background:var(--t1);color:var(--surf);border-color:var(--t1)}
.main{display:flex;height:calc(100vh - 42px - 38px - 33px - 43px)}
.panel-left{width:320px;flex-shrink:0;border-right:1px solid var(--rule);background:var(--surf);display:flex;flex-direction:column;overflow:hidden}
.list-meta{padding:4px 10px;border-bottom:1px solid var(--rule2);display:flex;justify-content:space-between;flex-shrink:0}
.list-meta span{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3)}
.co-list{overflow-y:auto;flex:1}
.co-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--rule3);cursor:pointer;transition:background .1s;user-select:none}
.co-row:hover{background:var(--surf2)}
.co-row.selected{background:var(--gb);border-left:2px solid var(--g);padding-left:8px}
.co-av{width:28px;height:28px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;border:1px solid transparent}
.co-info-sm{flex:1;min-width:0}
.co-name-sm{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.co-meta-sm{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.co-right-sm{display:flex;align-items:center;gap:4px;flex-shrink:0}
.icp-num{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t4);min-width:14px;text-align:right}
.tech-pill{font-family:'IBM Plex Mono',monospace;font-size:7px;padding:1px 4px;border-radius:2px;background:var(--pb);color:var(--pc);border:1px solid var(--pr);white-space:nowrap;flex-shrink:0}
.press-pill{font-family:'IBM Plex Mono',monospace;font-size:7px;padding:1px 4px;border-radius:2px;background:var(--prb);color:var(--prc);border:1px solid var(--prr);white-space:nowrap;flex-shrink:0}
.tag{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;padding:1px 5px;border-radius:2px;border:1px solid;white-space:nowrap}
.tc{color:var(--cc);background:var(--cb);border-color:var(--cr)}
.tp{color:var(--pc);background:var(--pb);border-color:var(--pr)}
.tpr{color:var(--prc);background:var(--prb);border-color:var(--prr)}
.tn{color:var(--nc);background:var(--nb);border-color:var(--nr)}
.tpo{color:var(--poc);background:var(--pob);border-color:var(--por)}
.panel-right{flex:1;overflow-y:auto;background:var(--surf2);padding:12px}
.banner{background:var(--surf);border:1px solid var(--rule);border-radius:3px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;margin-bottom:6px;box-shadow:var(--sh)}
.co-logo{width:40px;height:40px;border-radius:3px;background:var(--g);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;letter-spacing:-0.5px}
.co-hdr-info{flex:1;min-width:0}
.co-hdr-name{font-size:16px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.co-domain{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t3)}
.co-sub{font-size:11px;color:var(--t2);margin-top:3px}
.icp-row{display:flex;align-items:center;gap:10px;margin-top:6px}
.stars{color:var(--g);font-size:13px;letter-spacing:1px}
.icp-reason{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3)}
.section{background:var(--surf);border:1px solid var(--rule);border-radius:3px;overflow:hidden;margin-bottom:6px;box-shadow:var(--sh)}
.sec-hdr{background:var(--surf2);padding:6px 12px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:6px}
.sec-label{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)}
.sec-body{padding:10px 12px}
table.info{width:100%;border-collapse:collapse;font-size:12px}
table.info tr td{padding:4px 0;vertical-align:top;border-bottom:1px solid var(--rule3)}
table.info tr:last-child td{border-bottom:none}
table.info tr td:first-child{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t3);width:110px;padding-right:12px;text-transform:uppercase;letter-spacing:.04em}
.note{background:var(--surf2);border-left:2px solid var(--g);padding:8px 12px;font-size:11px;color:var(--t2);margin-top:6px;line-height:1.6}
.btn{height:24px;padding:0 10px;border:1px solid var(--rule);border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;background:var(--surf2);color:var(--t2);transition:all .15s}
.btn:hover{background:var(--surf3);color:var(--t1)}
.btn.primary{background:var(--g);color:#fff;border-color:var(--g)}
.btn.primary:hover{background:var(--gd)}
.btn-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
a.ml{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--g);text-decoration:none}
a.ml:hover{text-decoration:underline}
.tech-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.tech-item{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 6px;border-radius:2px;border:1px solid var(--rule);background:var(--surf2);color:var(--t2)}
.tech-item.analytics{background:var(--cb);color:var(--cc);border-color:var(--cr)}
.tech-item.advertising{background:var(--pob);color:var(--poc);border-color:var(--por)}
.tech-item.crm{background:var(--prb);color:var(--prc);border-color:var(--prr)}
.tech-item.identity{background:var(--pb);color:var(--pc);border-color:var(--pr)}
.tech-item.cmp{background:var(--nb);color:var(--nc);border-color:var(--nr)}
.dsp-badges{display:flex;flex-wrap:wrap;gap:4px}
.dsp-badge{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:1px 6px;border-radius:2px;background:var(--gb);color:var(--g);border:1px solid var(--gr)}
.press-link{display:flex;flex-direction:column;padding:7px 0;border-bottom:1px solid var(--rule3)}
.press-link:last-child{border-bottom:none}
.press-title{font-size:12px;font-weight:500;color:var(--t1);margin-bottom:2px}
.press-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);display:flex;gap:8px;flex-wrap:wrap}
.press-summary{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.5}
.press-type{font-family:'IBM Plex Mono',monospace;font-size:7px;padding:1px 4px;border-radius:2px;border:1px solid var(--rule);color:var(--t3);text-transform:uppercase}
.ctx-menu{position:fixed;background:var(--surf);border:1px solid var(--rule);border-radius:4px;padding:5px;z-index:9999;min-width:230px;box-shadow:var(--sh)}
.ctx-label{font-size:11px;color:var(--t2);padding:5px 10px 3px;font-weight:500}
.ctx-sep{height:1px;background:var(--rule);margin:4px 0}
.ctx-item{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:12px;color:var(--t1);border-radius:2px;cursor:pointer;transition:background .1s}
.ctx-item:hover{background:var(--surf2)}
.ctx-icon{font-size:13px;width:16px;text-align:center}
.empty-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--t3)}
.empty-panel .big{font-family:'IBM Plex Mono',monospace;font-size:40px;font-weight:200;letter-spacing:-2px;margin-bottom:8px;color:var(--t4)}
.empty-panel .sub{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em}

/* ── TASK RUNNER ─────────────────────────────────────────────────────────── */
/* Toast bar — bottom-right corner, stacks vertically */
#toast-stack{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:8000;pointer-events:none}
.toast{pointer-events:all;display:flex;align-items:center;gap:10px;min-width:300px;max-width:400px;background:var(--surf);border:1px solid var(--rule);border-radius:4px;padding:10px 14px;box-shadow:var(--sh);transition:opacity .3s,transform .3s;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.toast.done{border-left:3px solid var(--g)}
.toast.error{border-left:3px solid #E24B4A}
.toast.running{border-left:3px solid var(--poc)}
.toast-icon{font-size:14px;flex-shrink:0}
.toast-body{flex:1;min-width:0}
.toast-title{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast-actions{display:flex;gap:5px;flex-shrink:0}
.toast-btn{height:20px;padding:0 8px;border:1px solid var(--rule);border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:8px;cursor:pointer;background:var(--surf2);color:var(--t2);transition:background .1s;text-transform:uppercase;letter-spacing:.04em}
.toast-btn:hover{background:var(--surf3);color:var(--t1)}
.toast-btn.primary{background:var(--g);color:#fff;border-color:var(--g)}
.toast-close{width:16px;height:16px;border:none;background:none;cursor:pointer;color:var(--t3);font-size:14px;line-height:1;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.toast-close:hover{color:var(--t1)}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:12px;height:12px;border:1.5px solid var(--rule);border-top-color:var(--poc);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* Result drawer — slides up from bottom of center panel */
#result-drawer{position:fixed;bottom:0;left:320px;right:0;max-height:55vh;background:var(--surf);border-top:1px solid var(--rule);box-shadow:0 -4px 24px rgba(0,0,0,.12);z-index:7000;display:none;flex-direction:column}
#result-drawer.open{display:flex}
.drawer-hdr{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--rule);flex-shrink:0;background:var(--surf2)}
.drawer-hdr-title{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);flex:1}
.drawer-close{width:22px;height:22px;border:1px solid var(--rule);border-radius:2px;background:none;cursor:pointer;color:var(--t3);font-size:12px;display:flex;align-items:center;justify-content:center}
.drawer-close:hover{background:var(--surf3);color:var(--t1)}
.drawer-body{overflow-y:auto;flex:1;padding:12px 16px;font-size:12px;color:var(--t1);line-height:1.7}
.drawer-body pre{font-family:'IBM Plex Mono',monospace;font-size:11px;white-space:pre-wrap;word-break:break-word;color:var(--t2)}
/* Streaming cursor blink */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cursor{display:inline-block;width:7px;height:12px;background:var(--poc);vertical-align:text-bottom;animation:blink .9s infinite;margin-left:2px}
/* Btn loading state */
.btn.loading{opacity:.6;cursor:wait;pointer-events:none}
.btn.loading::after{content:'';display:inline-block;width:8px;height:8px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-left:5px;vertical-align:middle}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-logo">oA</div>
  <span class="nav-brand">Sales Intelligence Hub <span class="nav-sub">/ onAudience</span></span>
  <div class="nav-right">
    <div class="synced"><div class="dot"></div><span id="syncLabel" style="font-family:'IBM Plex Mono',monospace;font-size:10px">Loading…</span></div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">🌙</button>
  </div>
</nav>

<div class="stats-bar">
  <div class="sc active" onclick="setFilter('all',this)"><div class="sn" id="st-all">—</div><div class="sl">All</div></div>
  <div class="sc" onclick="setFilter('client',this)"><div class="sn" id="st-client">—</div><div class="sl">Clients</div></div>
  <div class="sc" onclick="setFilter('poc',this)"><div class="sn" id="st-poc">—</div><div class="sl">POC</div></div>
  <div class="sc" onclick="setFilter('partner',this)"><div class="sn" id="st-partner">—</div><div class="sl">Partners</div></div>
  <div class="sc" onclick="setFilter('prospect',this)"><div class="sn" id="st-prospect">—</div><div class="sl">Prospects</div></div>
  <div class="sc" onclick="setFilter('enriched',this)"><div class="sn" id="st-enriched">—</div><div class="sl">Has Tech Stack</div></div>
  <div class="sc" onclick="setFilter('nogo',this)"><div class="sn" id="st-nogo">—</div><div class="sl">No Outreach</div></div>
</div>

<div class="search-bar">
  <div class="sbox">
    <span class="sico">⌕</span>
    <input class="sinp" id="searchQ" placeholder="Search name, category, DSP, region, HQ…" oninput="renderList()"/>
  </div>
  <div class="fpills">
    <button class="fp active" id="fp-all" onclick="setFilter('all',this)">All</button>
    <button class="fp" id="fp-poc" onclick="setFilter('poc',this)">Active deal</button>
    <button class="fp" id="fp-client" onclick="setFilter('client',this)">Clients</button>
    <button class="fp" id="fp-partner" onclick="setFilter('partner',this)">Partners</button>
    <button class="fp" id="fp-prospect" onclick="setFilter('prospect',this)">Prospects</button>
    <button class="fp" id="fp-enriched" onclick="setFilter('enriched',this)">Has tech stack</button>
    <button class="fp" id="fp-nogo" onclick="setFilter('nogo',this)">No outreach</button>
  </div>
</div>

<div class="main">
  <div class="panel-left">
    <div class="list-meta"><span id="listMeta">Loading…</span><span>right-click for actions</span></div>
    <div class="co-list" id="coList"></div>
  </div>
  <div class="panel-right" id="detail">
    <div class="empty-panel"><div class="big">←</div><div class="sub">Select a company</div></div>
  </div>
</div>

<div id="ctxMenu" class="ctx-menu" style="display:none"></div>

<!-- Toast stack -->
<div id="toast-stack"></div>

<!-- Result drawer -->
<div id="result-drawer">
  <div class="drawer-hdr">
    <span class="drawer-hdr-title" id="drawer-title">Result</span>
    <button class="btn toast-btn" id="drawer-copy-btn" onclick="drawerCopy()" style="margin-right:4px">Copy</button>
    <button class="drawer-close" onclick="drawerClose()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
const SB = 'https://nyzkkqqjnkctcmxoirdj.supabase.co/rest/v1';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55emtrcXFqbmtjdGNteG9pcmRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzMxMzYsImV4cCI6MjA4OTQ0OTEzNn0.jhAq_C68klOp4iTyj9HmsyyvoxsOI6ACld7t_87TAk0';
const H = {apikey:KEY, Authorization:'Bearer '+KEY};

let companies=[], contacts=[], intel=[], activeFilter='all', selectedId=null;

let theme=localStorage.getItem('oaTheme')||'light';
document.documentElement.setAttribute('data-theme',theme);
function toggleTheme(){
  theme=theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',theme);
  localStorage.setItem('oaTheme',theme);

async function loadData(){
  try{
    const t=setTimeout(()=>{ document.getElementById('syncLabel').textContent='⚠ Slow connection…'; },5000);
    const [co,ct,it]=await Promise.all([
      fetch(`${SB}/companies?select=*&order=icp.desc.nullslast,name.asc`,{headers:H}).then(r=>r.json()),
      fetch(`${SB}/contacts?select=id,full_name,title,company_id,company_name,email`,{headers:H}).then(r=>r.json()),
      fetch(`${SB}/intelligence?select=*`,{headers:H}).then(r=>r.json())
    ]);
    clearTimeout(t);
    if(Array.isArray(co))companies=co;
    if(Array.isArray(ct))contacts=ct;
    if(Array.isArray(it))intel=it;
    document.getElementById('syncLabel').textContent=`● Live · ${companies.length} co · ${contacts.length} ct`;

}

function av(n){var p=[['#9FE1CB30','#0F6E56'],['#B5D4F430','#1A4F8A'],['#FAC77530','#7A4200'],['#C0DD9730','#3B6D11'],['#F4C0D130','#993556']];var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))&0xffff;return p[h%p.length]}
function ini(n){return(n||'').replace(/[^A-Za-z ]/g,'').split(' ').filter(Boolean).map(function(w){return w[0]}).slice(0,2).join('').toUpperCase()||'?'}
function tagCls(s){return{client:'tc',partner:'tp',prospect:'tpr',nogo:'tn',poc:'tpo'}[s]||'tpr'}
function tagLbl(s){return{client:'Client',partner:'Partner',prospect:'Prospect',nogo:'No outreach',poc:'Active Deal'}[s]||s}
function stars(n){var s=Math.min(5,Math.round((n||0)/2));return'★'.repeat(s)+'☆'.repeat(5-s)}
function dom(url){if(!url)return'';try{return new URL(url.includes('://')?url:'https://'+url).hostname.replace('www.','')}catch(e){return url.split('/')[0]}}
function dsps(c){return Array.isArray(c.dsps)?c.dsps:[]}
function techStack(c){return Array.isArray(c.tech_stack)?c.tech_stack:[]}
function pressLinks(c){var r=intel.find(function(i){return i.company_id===c.id&&i.type==='press_links'});return Array.isArray(r&&r.content)?r.content:[]}
function techScan(c){return intel.find(function(i){return i.company_id===c.id&&i.type==='tech_scan'})||null}
function coContacts(c){return contacts.filter(function(ct){return ct.company_id===c.id})}

// Each task: {id, label, prompt, status:'queued|running|done|error', toastEl, result}
var _tasks = {};
var _taskSeq = 0;

// Determine which actions run in background vs open Claude tab
// Background: quick-output tasks (draft email, find contacts, activation path, similar)
// Claude tab: complex multi-step tasks (full report, tech scan, press lookup, gmail)
var BG_ACTIONS = {
  'draft_email':    true,
  'find_dms':       true,
  'activation':     true,
  'find_similar':   true,
  'prioritize':     true,
  'why_nogo':       true,
};

function runBg(label, prompt, btnEl) {
  var id = 'task-' + (++_taskSeq);
  // Mark button loading
  if(btnEl){ btnEl.classList.add('loading'); btnEl.dataset.taskId = id; }

  // Create toast
  var toast = document.createElement('div');
  toast.className = 'toast running';
  toast.id = 'toast-'+id;
  toast.innerHTML = '<div class="spinner"></div>'
    +'<div class="toast-body">'
    +'<div class="toast-title">'+label+'</div>'
    +'<div class="toast-sub" id="tsub-'+id+'">Starting…</div>'
    +'</div>'
    +'<div class="toast-actions"><button class="toast-close" onclick="dismissToast(\''+id+'\')">✕</button></div>';
  document.getElementById('toast-stack').appendChild(toast);
  _tasks[id] = {label:label, prompt:prompt, status:'running', toastEl:toast, result:'', btnEl:btnEl||null};

  // Call Anthropic API with streaming
  callClaudeStream(id, prompt);
  return id;
}

async function callClaudeStream(id, prompt) {
  var task = _tasks[id];
  var sub = document.getElementById('tsub-'+id);
  var charCount = 0;
  var PROXY = 'https://nyzkkqqjnkctcmxoirdj.supabase.co/functions/v1/claude-proxy';

  try {
    var resp = await fetch(PROXY, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        stream: true,
        system: 'You are a sales intelligence assistant for onAudience, a programmatic audience data company. Give concise, actionable answers. Use plain text with minimal formatting — no markdown headers, keep lists short. Max 250 words unless the task requires more.',
        messages: [{role:'user', content: prompt}]
      })
    });

    if(!resp.ok){ throw new Error('Proxy ' + resp.status); }

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    var lastDraw = 0;
    task.result = '';

    while(true) {
      var _r = await reader.read();
      if(_r.done) break;
      buffer += decoder.decode(_r.value, {stream:true});
      var lines = buffer.split('\n');
      buffer = lines.pop();
      for(var i=0;i<lines.length;i++){
        var line = lines[i].trim();
        if(!line.startsWith('data:')) continue;
        var data = line.slice(5).trim();
        if(data === '[DONE]') continue;
        try {
          var ev = JSON.parse(data);
          if(ev.type === 'content_block_delta' && ev.delta && ev.delta.text) {
            task.result += ev.delta.text;
            charCount += ev.delta.text.length;
            if(sub) sub.textContent = charCount + ' chars…';
            // Live-stream into drawer if open for this task (throttle ~60fps)
            var now = Date.now();
            if(now - lastDraw > 80) {
              lastDraw = now;
              var drawer = document.getElementById('result-drawer');
              if(drawer.classList.contains('open') && drawer.dataset.taskId === id) {
                var db = document.getElementById('drawer-body');
                db.innerHTML = '<pre>' + esc(task.result) + '</pre><span class="cursor"></span>';
                db.scrollTop = db.scrollHeight;
              }
            }
          }
        } catch(e){}
      }
    }

    // Done — update toast
    task.status = 'done';
    var toast = task.toastEl;
    if(toast){
      toast.className = 'toast done';
      toast.innerHTML = '<span class="toast-icon">✓</span>'
        +'<div class="toast-body">'
        +'<div class="toast-title">'+task.label+'</div>'
        +'<div class="toast-sub">Done · '+charCount+' chars</div>'
        +'</div>'
        +'<div class="toast-actions">'
        +'<button class="toast-btn primary" onclick="showResult(''+id+'')">View</button>'
        +'<button class="toast-close" onclick="dismissToast(''+id+'')">&#x2715;</button>'
        +'</div>';
      setTimeout(function(){ autoDismissToast(id); }, 8000);
    }
    if(task.btnEl){ task.btnEl.classList.remove('loading'); }
    // Final drawer update — remove cursor, open if not already
    showResult(id);

  } catch(err) {
    task.status = 'error';
    var toast = task.toastEl;
    if(toast){
      toast.className = 'toast error';
      toast.innerHTML = '<span class="toast-icon">✗</span>'
        +'<div class="toast-body">'
        +'<div class="toast-title">'+task.label+'</div>'
        +'<div class="toast-sub" title="'+err.message+'">'+err.message.slice(0,60)+'</div>'
        +'</div>'
        +'<div class="toast-actions">'
        +'<button class="toast-btn" onclick="openClaudeTab(''+id+'')">Try in Claude</button>'
        +'<button class="toast-close" onclick="dismissToast(''+id+'')">&#x2715;</button>'
        +'</div>';
    }
    if(task.btnEl){ task.btnEl.classList.remove('loading'); }
  }
}
function showResult(id) {
  var task = _tasks[id];
  if(!task) return;
  document.getElementById('drawer-title').textContent = task.label;
  // Render result — convert basic markdown to readable HTML
  var html = task.status === 'running'
    ? '<pre>' + esc(task.result) + '</pre><span class="cursor"></span>'
    : '<pre>' + esc(task.result) + '</pre>';
  document.getElementById('drawer-body').innerHTML = html;
  document.getElementById('result-drawer').classList.add('open');
  // Store current task id on drawer for copy
  document.getElementById('result-drawer').dataset.taskId = id;
}

function drawerClose(){
  document.getElementById('result-drawer').classList.remove('open');
}
function drawerCopy(){
  var id = document.getElementById('result-drawer').dataset.taskId;
  var task = id && _tasks[id];
  if(task && task.result){ navigator.clipboard.writeText(task.result); }
  var btn = document.getElementById('drawer-copy-btn');
  btn.textContent = 'Copied!';
  setTimeout(function(){ btn.textContent = 'Copy'; }, 1500);
}
function dismissToast(id){
  var task = _tasks[id];
  if(task && task.toastEl){ task.toastEl.remove(); }
}
function autoDismissToast(id){
  var task = _tasks[id];
  // Only auto-dismiss if drawer is currently showing this result (user already saw it)
  var drawer = document.getElementById('result-drawer');
  if(drawer.dataset.taskId === id || task.status !== 'done') return;
  dismissToast(id);
}
function openClaudeTab(id){
  var task = _tasks[id];
  if(task) openClaude(task.prompt);
  dismissToast(id);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Original Claude tab opener — kept for complex tasks
function openClaude(p){window.open('https://claude.ai/new?q='+encodeURIComponent(p),'_blank');}

// Smart dispatch: run in background or open tab based on action type
function runAction(actionKey, label, prompt, btnEl) {
  if(BG_ACTIONS[actionKey]) {
    runBg(label, prompt, btnEl);
  } else {
    openClaude(prompt);
  }
}

loadData();
</script>

</html>
