<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>onAudience — Sales Intelligence Hub</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="hub.css"/>
</head>
<body>

<div class="app">

  <!-- ── NAV ── -->
  <nav class="nav">
    <div class="nav-logo">oA</div>
    <span class="nav-brand">Sales Hub <span class="nav-sub">/ onAudience</span></span>
    <div class="nav-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Seed</span>
    </div>
    <div class="nav-right">
      <button class="btn-skowyt" id="skowytBtn" onclick="skowyt()">
        <span class="skowyt-ic" id="skowytIc">↓</span>
        <span id="skowytLbl">Skowyt</span>
      </button>
      <button class="btn" id="themeBtn" onclick="toggleTheme()" style="width:26px;padding:0">🌙</button>
    </div>
  </nav>

  <!-- ── STATS BAR ── -->
  <div class="stats-bar">
    <div class="sc active" data-f="all" onclick="setFilter('all',this)">
      <div class="sc-num" id="stAll">—</div>
      <div class="sc-lbl">Total</div>
    </div>
    <div class="sc" data-f="client" onclick="setFilter('client',this)">
      <div class="sc-num" id="stClient">—</div>
      <div class="sc-lbl">Clients</div>
    </div>
    <div class="sc" data-f="poc" onclick="setFilter('poc',this)">
      <div class="sc-num" id="stPoc">—</div>
      <div class="sc-lbl">POC</div>
    </div>
    <div class="sc" data-f="partner" onclick="setFilter('partner',this)">
      <div class="sc-num" id="stPartner">—</div>
      <div class="sc-lbl">Partners</div>
    </div>
    <div class="sc" data-f="prospect" onclick="setFilter('prospect',this)">
      <div class="sc-num" id="stProspect">—</div>
      <div class="sc-lbl">Prospects</div>
    </div>
    <div class="sc" data-f="nogo" onclick="setFilter('nogo',this)">
      <div class="sc-num" id="stNogo">—</div>
      <div class="sc-lbl">No outreach</div>
    </div>
  </div>

  <!-- ── PANELS ── -->
  <div class="panels">

    <!-- LEFT PANEL -->
    <div class="panel-left">

      <!-- Tab bar -->
      <div class="tab-bar">
        <div class="tab active" data-tab="companies" onclick="switchTab('companies')">Companies</div>
        <div class="tab" data-tab="contacts" onclick="switchTab('contacts')">Contacts</div>
      </div>

      <!-- Companies sub-panel -->
      <div id="coPanel" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div class="panel-search">
          <div class="search-wrap">
            <span class="search-ico">⌕</span>
            <input class="sinp" id="coSearch" placeholder="Search…" oninput="renderList()"/>
          </div>
          <button class="btn sm" onclick="doResearch()">↗</button>
        </div>
        <div class="filter-pills">
          <button class="fp active" data-f="all"      onclick="setFilter('all',this)">All</button>
          <button class="fp"        data-f="client"   onclick="setFilter('client',this)">Clients</button>
          <button class="fp"        data-f="partner"  onclick="setFilter('partner',this)">Partners</button>
          <button class="fp"        data-f="prospect" onclick="setFilter('prospect',this)">Prospects</button>
          <button class="fp"        data-f="poc"      onclick="setFilter('poc',this)">POC</button>
          <button class="fp"        data-f="nogo"     onclick="setFilter('nogo',this)">No outreach</button>
        </div>
        <div class="list-meta-bar">
          <span id="coMeta">Loading…</span>
          <span id="coSrc"></span>
        </div>
        <div class="co-list" id="coList"></div>
      </div>

      <!-- Contacts sub-panel -->
      <div id="ctPanel" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="panel-search">
          <div class="search-wrap">
            <span class="search-ico">⌕</span>
            <input class="sinp" id="ctSearch" placeholder="Search contacts…" oninput="renderContacts()"/>
          </div>
        </div>
        <div class="list-meta-bar">
          <span id="ctMeta">—</span>
        </div>
        <div class="ct-list" id="ctList"></div>
      </div>

    </div><!-- /panel-left -->

    <!-- CENTER PANEL -->
    <div class="panel-center" id="centerPanel">
      <!-- filled by JS -->
    </div>

  </div><!-- /panels -->

</div><!-- /app -->

<!-- CONTACT DRAWER (outside .app) -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-av" id="drawerAv">??</div>
    <div>
      <div class="drawer-name" id="drawerName">—</div>
      <div class="drawer-title" id="drawerTitle">—</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx" id="ctxMenu"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <h2 id="modalTitle">Research a company</h2>
    <p id="modalDesc">Enter company name</p>
    <textarea id="modalInput" placeholder="Company name…"></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn p" onclick="submitModal()">Open in Claude ↗</button>
    </div>
  </div>
</div>

<script src="hub.js"></script>
</body>
</html>
