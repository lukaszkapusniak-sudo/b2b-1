<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>onAudience — Sales Intelligence Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟢</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ═══ NAV ═══════════════════════════════════════════════ -->
  <nav class="nav">
    <div class="nav-logo">oA</div>
    <span class="nav-title">Sales Intelligence Hub <span class="nav-sub">/ onAudience</span></span>
    <div class="nav-status" id="navStatus"><span class="dot dot-seed"></span> Loading…</div>
    <div class="nav-right">
      <button class="btn sm" onclick="syncDB()">↺ Sync</button>
      <button class="btn sm p" onclick="openMeeseeks()">✉ Compose</button>
      <button class="btn sm" onclick="openResearchModal()">+ Research</button>
      <button class="btn sm" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </nav>

  <!-- ═══ STATS BAR ═════════════════════════════════════════ -->
  <div class="stats">
    <div class="stat act" id="stat-all" onclick="applyFilter('all')">
      <div class="stat-n">—</div><div class="stat-l">All</div>
    </div>
    <div class="stat" id="stat-client" onclick="applyFilter('client')">
      <div class="stat-n">—</div><div class="stat-l">Clients</div>
    </div>
    <div class="stat" id="stat-poc" onclick="applyFilter('poc')">
      <div class="stat-n">—</div><div class="stat-l">POC</div>
    </div>
    <div class="stat" id="stat-partner" onclick="applyFilter('partner')">
      <div class="stat-n">—</div><div class="stat-l">Partners</div>
    </div>
    <div class="stat" id="stat-prospect" onclick="applyFilter('prospect')">
      <div class="stat-n">—</div><div class="stat-l">Prospects</div>
    </div>
    <div class="stat" id="stat-nogo" onclick="applyFilter('nogo')">
      <div class="stat-n">—</div><div class="stat-l">No Outreach</div>
    </div>
    <div class="stat" id="stat-fresh" onclick="applyFilter('fresh')">
      <div class="stat-n">—</div><div class="stat-l">Fresh 🥩</div>
    </div>
  </div>

  <!-- ═══ BODY (left + center) ══════════════════════════════ -->
  <div class="body">

    <!-- ─── LEFT PANEL ────────────────────────────────────── -->
    <div id="left">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab act" id="tab-co" onclick="switchTab('companies')">Companies</button>
        <button class="tab" id="tab-ct" onclick="switchTab('contacts')">Contacts</button>
        <button class="tab" id="tab-tc" onclick="switchTab('tcf')">TCF</button>
        <button class="tab" id="tab-en" onclick="switchTab('enricher')">Enricher</button>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <input id="searchInput" placeholder="Search…" autocomplete="off">
        <button class="btn sm" onclick="openResearchModal()">🏷</button>
        <button class="btn sm" onclick="openClaude('onAudience prospect research')">↗</button>
      </div>

      <!-- Filter pills -->
      <div class="filter-bar" id="filterBar">
        <button class="btn sm" onclick="applyFilter('all')">All</button>
        <button class="btn sm" onclick="applyFilter('client')">Clients</button>
        <button class="btn sm" onclick="applyFilter('partner')">Partners</button>
        <button class="btn sm" onclick="applyFilter('prospect')">Prospects</button>
        <button class="btn sm" onclick="applyFilter('poc')">POC</button>
        <button class="btn sm" onclick="applyFilter('nogo')">Nogo</button>
      </div>

      <!-- List meta -->
      <div class="list-meta" id="listMeta">Loading…</div>

      <!-- Company list (default visible) -->
      <div id="coList"></div>

      <!-- Contact list (hidden by default) -->
      <div id="ctList" style="display:none"></div>

      <!-- TCF list (hidden by default) -->
      <div id="tcfList" style="display:none"></div>

      <!-- Enricher pane (hidden by default) -->
      <div id="pane-enricher">
        <!-- AI Find bar -->
        <div class="enr-bar">
          <textarea id="enrDesc" rows="2" placeholder="Describe companies to find… e.g. 'DSPs in EMEA using TTD with no EU data'"></textarea>
          <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
            <button class="btn sm p" onclick="enrFind()">🔍 Find</button>
            <button class="btn sm" onclick="enrSelectAll()">☑ All</button>
            <button class="btn sm" onclick="enrSelectNone()">☐ None</button>
          </div>
        </div>
        <!-- Select bar -->
        <div class="enr-select-bar">
          <span id="enrSelCount" style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3)">0 selected</span>
          <span id="enrListMeta" style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t4)"></span>
          <button class="btn sm p" style="margin-left:auto" onclick="enrGenerate()">⚡ Generate Script</button>
        </div>
        <!-- Company list -->
        <div id="enrCoList"></div>
        <!-- Tag cloud -->
        <div class="enr-tag-cloud">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:4px">Quick select by tag</div>
          <div id="enrTagCloud" style="display:flex;flex-wrap:wrap;gap:3px"></div>
        </div>
      </div>

    </div><!-- /left -->

    <!-- ─── CENTER PANEL ──────────────────────────────────── -->
    <div id="center">
      <!-- Filled by JS: empty state → company detail -->
    </div>

  </div><!-- /body -->

</div><!-- /app -->

<!-- ═══ OVERLAYS — outside .app to avoid overflow:hidden clip ═══ -->

<!-- Contact Drawer -->
<div id="drawerOverlay"></div>
<div id="contactDrawer"></div>

<!-- Context Menu -->
<div id="ctxMenu"></div>

<!-- Research Modal -->
<div id="overlay">
  <div class="modal-box">
    <h3 style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;margin-bottom:12px">
      🔍 Research a Company
    </h3>
    <p style="font-size:12px;color:var(--t2);margin-bottom:10px">
      Enter a company name to generate a full contact report with decision makers, outreach angle, and ICP fit.
    </p>
    <input id="modalInput" placeholder="Company name…"
      style="width:100%;height:32px;padding:0 10px;border:1px solid var(--rule);border-radius:2px;
             font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--surf2);color:var(--t1);outline:none;margin-bottom:10px">
    <div style="display:flex;gap:6px;justify-content:flex-end">
      <button class="btn" onclick="closeResearchModal()">Cancel</button>
      <button class="btn p" onclick="submitResearch()">Open in Claude ↗</button>
    </div>
  </div>
</div>

<!-- Panel Modal (iframe host) -->
<div id="panelModal">
  <div class="panel-frame">
    <iframe id="panelIframe" src=""></iframe>
  </div>
</div>

<!-- Meeseeks Modal -->
<div id="meeseeksModal">
  <div class="meesBox">
    <!-- Rendered by meeseeks.js -->
  </div>
</div>

<!-- ═══ BOOT ════════════════════════════════════════════════ -->
<script type="module" src="app.js"></script>

</body>
</html>
